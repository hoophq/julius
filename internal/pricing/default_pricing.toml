# Default model pricing, USD per million tokens.
#
# This table is a snapshot — provider prices change. Every cost julius
# prints is labeled with the as_of date below. To use your own rates,
# write a table in this format to <user config dir>/julius/pricing.toml
# (or point JULIUS_PRICING at a file); it replaces this table entirely.
# `julius pricing` shows the active table and where it came from.
#
# Models not listed here render as unpriced ("—") rather than guessed.

as_of = "2026-07-13"

# Anthropic — cache_read is 0.1x input; cache_write is the 5-minute-TTL
# rate (1.25x input). 1-hour cache writes bill at 2x input, which the
# provider-reported aggregate cannot distinguish — override if your
# workload is 1-hour-TTL-heavy.

[models."claude-fable-5"]
