# Target command catalog: the dev commands julius aims to cover with builtin
# filters, and the honest state of each row. Enforced by TestCatalogCoverage
# (catalog_test.go), which fails when a row drifts from reality:
#
#   filter = "<name>"      the command must resolve to exactly that builtin
#                          filter via Registry.Pick
#   status = "planned"     no builtin may match yet; ref = tracking issue
#   status = "wont-cover"  no builtin may match; reason = why not
#
# Every builtin filter must also appear in at least one covered row, so a new
# filter registers here in the same PR that adds it. Coverage % (covered over
# covered+planned, per category and overall) is logged by the test.

commands = [
  # file-ops
  { cmd = "ls -la", category = "file-ops", filter = "ls" },
  { cmd = "grep -rn 'pattern' src/", category = "file-ops", filter = "grep" },
  { cmd = "sed -n '1,120p' src/main.go", category = "file-ops", filter = "sed" },
  { cmd = "find . -name '*.go'", category = "file-ops", filter = "find" },
  { cmd = "tree -L 2", category = "file-ops", filter = "tree" },
  { cmd = "rg 'pattern' src/", category = "file-ops", filter = "grep" },
  { cmd = "diff -u old.go new.go", category = "file-ops", filter = "diff" },
  { cmd = "cat src/main.go", category = "file-ops", status = "wont-cover", reason = "file reads flow through the agent's native Read tool; the PostToolUse hook dedups and bounds them" },

  # vcs
  { cmd = "git status", category = "vcs", filter = "git-status" },
  { cmd = "git log --oneline -20", category = "vcs", filter = "git-log" },
  { cmd = "git diff HEAD", category = "vcs", filter = "git-diff" },
  { cmd = "git add -A", category = "vcs", filter = "git-add" },
  { cmd = "git commit -m 'msg'", category = "vcs", filter = "git-commit" },
  { cmd = "git push origin main", category = "vcs", filter = "git-push" },
  { cmd = "git pull", category = "vcs", filter = "git-pull" },
  { cmd = "git fetch origin", category = "vcs", filter = "git-fetch" },

  # github
  { cmd = "gh pr list", category = "github", filter = "gh-list" },
  { cmd = "gh pr view 42", category = "github", filter = "gh-pr-view" },
  { cmd = "gh issue list", category = "github", filter = "gh-list" },
  { cmd = "gh run list", category = "github", filter = "gh-list" },
  { cmd = "gh run view 29123153293 --log", category = "github", filter = "gh-run-view" },
  { cmd = "gh release list", category = "github", filter = "gh-list" },
  { cmd = "gh workflow list", category = "github", filter = "gh-list" },

  # testing
  { cmd = "go test ./...", category = "testing", filter = "go-test" },
  { cmd = "pytest", category = "testing", filter = "pytest" },
  { cmd = "npx jest", category = "testing", filter = "js-test" },
  { cmd = "npx vitest run", category = "testing", filter = "js-test" },
  { cmd = "cargo test", category = "testing", filter = "cargo-test" },
  { cmd = "npx playwright test", category = "testing", filter = "playwright" },
  { cmd = "rspec", category = "testing", filter = "rspec" },
  { cmd = "bundle exec rspec", category = "testing", filter = "rspec" },
  { cmd = "bin/rspec", category = "testing", filter = "rspec" },
  { cmd = "rake test", category = "testing", filter = "rake-test" },
  { cmd = "rails test", category = "testing", filter = "rake-test" },

  # lint-format
  { cmd = "npx eslint .", category = "lint-format", filter = "eslint" },
  { cmd = "npx tsc --noEmit", category = "lint-format", filter = "tsc" },
  { cmd = "npx prettier --check .", category = "lint-format", filter = "prettier" },
  { cmd = "ruff check .", category = "lint-format", filter = "ruff" },
  { cmd = "golangci-lint run", category = "lint-format", filter = "golangci-lint" },
  { cmd = "cargo clippy", category = "lint-format", filter = "cargo-build" },
  { cmd = "rubocop", category = "lint-format", filter = "rubocop" },
  { cmd = "npx biome check .", category = "lint-format", filter = "biome" },

  # build
  { cmd = "cargo build", category = "build", filter = "cargo-build" },
  { cmd = "make build", category = "build", filter = "make" },
  { cmd = "./gradlew build", category = "build", filter = "gradle" },
  { cmd = "mvn package", category = "build", filter = "maven" },
  { cmd = "npx next build", category = "build", filter = "next-build" },
  { cmd = "npx prisma generate", category = "build", filter = "prisma-generate" },

  # packages
  { cmd = "npm install", category = "packages", filter = "js-install" },
  { cmd = "pnpm install", category = "packages", filter = "js-install" },
  { cmd = "yarn add lodash", category = "packages", filter = "js-install" },
  { cmd = "npm ci", category = "packages", filter = "js-install" },
  { cmd = "pip install -r requirements.txt", category = "packages", filter = "pip-install" },
  { cmd = "uv sync", category = "packages", filter = "uv" },
  { cmd = "uv run pytest", category = "packages", filter = "pytest" },
  { cmd = "brew install jq", category = "packages", filter = "brew" },
  { cmd = "pip list", category = "packages", filter = "pip-list" },
  { cmd = "pip list --outdated", category = "packages", filter = "pip-list" },
  { cmd = "bundle install", category = "packages", filter = "bundle-install" },
  { cmd = "bundle update", category = "packages", filter = "bundle-install" },
  { cmd = "pnpm list", category = "packages", filter = "pnpm-list" },

  # cloud
  { cmd = "aws sts get-caller-identity", category = "cloud", filter = "aws-sts" },
  { cmd = "aws ec2 describe-instances", category = "cloud", filter = "aws-ec2" },
