  # containers
  { cmd = "docker logs app", category = "containers", filter = "docker-logs" },
  { cmd = "docker build -t app .", category = "containers", filter = "docker-build" },
  { cmd = "docker pull nginx:latest", category = "containers", filter = "docker-pull" },
  { cmd = "docker push registry/app:v1", category = "containers", filter = "docker-pull" },
  { cmd = "kubectl get pods", category = "containers", filter = "kubectl-get" },
  { cmd = "kubectl get services", category = "containers", filter = "kubectl-get" },
  { cmd = "kubectl describe pod api-0", category = "containers", filter = "kubectl-describe" },
  { cmd = "kubectl logs api-0", category = "containers", filter = "kubectl-logs" },
  { cmd = "docker ps -a", category = "containers", filter = "docker-ps" },
  { cmd = "docker images", category = "containers", filter = "docker-ps" },
  { cmd = "docker compose ps", category = "containers", filter = "docker-compose-ps" },
  { cmd = "oc get pods", category = "containers", filter = "kubectl-get" },
  { cmd = "oc logs api-0", category = "containers", filter = "kubectl-logs" },

  # iac
  { cmd = "terraform plan", category = "iac", filter = "terraform-plan" },
  { cmd = "tofu plan", category = "iac", filter = "terraform-plan" },
  { cmd = "pulumi preview", category = "iac", status = "planned", ref = "ATR-142" },
  { cmd = "pulumi up --yes", category = "iac", status = "planned", ref = "ATR-142" },
  { cmd = "pulumi destroy --yes", category = "iac", status = "planned", ref = "ATR-142" },
  { cmd = "pulumi refresh", category = "iac", status = "planned", ref = "ATR-142" },
  { cmd = "pulumi stack ls", category = "iac", status = "planned", ref = "ATR-142" },

  # network
  { cmd = "curl -s https://api.example.com/v1/items", category = "network", filter = "curl" },
  { cmd = "wget https://example.com/file.tar.gz", category = "network", filter = "wget" },

  # shell
  { cmd = "env", category = "shell", status = "planned", ref = "ATR-144" },
  { cmd = "printenv", category = "shell", status = "planned", ref = "ATR-144" },
]
