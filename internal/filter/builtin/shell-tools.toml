# Shell text tools run through Bash bypass the native-tool caps the hook
# applies (Grep is capped at 120 lines; shell grep was unbounded). These
# filters close that gap. Caps only — matched/printed lines are the
# payload, so nothing is dropped, just bounded.

[filters.grep]
description = "shell grep/rg: capped matches, same 120-line budget as native Grep"
command = '^((e|f)?grep|rg)\b'
strip_ansi = true
max_line_length = 500
head = 120

[[filters.grep.tests]]
name = "short match list unchanged"
input = """
internal/router/router.go:14:func SplitEnvPrefix(text string) (prefix, rest string) {
internal/router/router.go:40:func SplitChain(cmd string) []Part {
"""
want = """
internal/router/router.go:14:func SplitEnvPrefix(text string) (prefix, rest string) {
internal/router/router.go:40:func SplitChain(cmd string) []Part {
"""

[[filters.grep.tests]]
name = "rg matches unchanged"
input = """
internal/filter/dsl.go:74:func ParseFile(data []byte) ([]*Spec, error) {
internal/filter/dsl.go:150:func (s *Spec) Name() string { return s.name }
"""
want = """
internal/filter/dsl.go:74:func ParseFile(data []byte) ([]*Spec, error) {
internal/filter/dsl.go:150:func (s *Spec) Name() string { return s.name }
"""

[[filters.grep.tests]]
name = "minified line truncated"
input = "app.min.js:1:"
want = "app.min.js:1:…"

[filters.ls]
description = "ls: capped listing"
command = '^ls\b'
strip_ansi = true
head = 100

[[filters.ls.tests]]
name = "short listing unchanged"
input = """
README.md
go.mod
go.sum
"""
want = """
README.md
go.mod
go.sum
"""

[filters.sed]
description = "sed: capped output"
command = '^sed\b'
max_line_length = 500
head = 120

[[filters.sed.tests]]
name = "range print unchanged"
input = """
func main() {
	fmt.Println("hello")
}
"""
want = """
func main() {
	fmt.Println("hello")
}
"""

[filters.find]
description = "find: capped result list"
command = '^find\b'
strip_ansi = true
head = 100

[[filters.find.tests]]
name = "short result list unchanged"
input = """
./internal/filter/registry.go
./internal/filter/dsl.go
"""
want = """
./internal/filter/registry.go
./internal/filter/dsl.go
"""

[filters.tree]
description = "tree: capped listing"
command = '^tree\b'
strip_ansi = true
head = 100

[[filters.tree.tests]]
name = "short tree unchanged"
input = """
.
├── go.mod
└── internal
    └── filter
        └── registry.go

3 directories, 2 files
"""
want = """
.
├── go.mod
└── internal
    └── filter
        └── registry.go

3 directories, 2 files
"""

# Plain diff (non-git). Exit code 1 means "differences found", not failure —
# the hunks are the payload, so cap only; identical files collapse.
[filters.diff]
description = "diff: capped hunks, identical files collapse"
command = '^diff\b'
strip_ansi = true
head = 200
if_empty = "diff: no differences"

[[filters.diff.tests]]
name = "differences kept"
exit_code = 1
input = """
--- a/config.yaml
+++ b/config.yaml
@@ -3,3 +3,3 @@
 timeout: 30
-retries: 2
+retries: 5
"""
want = """
--- a/config.yaml
+++ b/config.yaml
@@ -3,3 +3,3 @@
 timeout: 30
-retries: 2
+retries: 5
"""

[[filters.diff.tests]]
name = "identical files collapse"
input = ""
want = "diff: no differences"
