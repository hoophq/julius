# git log — cap the depth; agents rarely need more than recent history.
[filters.git-log]
description = "git log: first 30 lines"
command = '^git\s+log\b'
strip_ansi = true
head = 30

[[filters.git-log.tests]]
name = "short log unchanged"
input = """
09e5a22 feat(cli): wrapper, route, hook
a2223b5 feat(filter): compression engine
"""
want = """
09e5a22 feat(cli): wrapper, route, hook
a2223b5 feat(filter): compression engine
"""

[filters.git-diff]
description = "git diff: drop index/mode noise, keep hunks"
command = '^git\s+diff\b'
strip_ansi = true
drop_lines = [
  '^index [0-9a-f]+\.\.[0-9a-f]+',
  '^old mode ',
  '^new mode ',
  '^similarity index ',
  '^rename from ',
  '^rename to ',
]
if_empty = "git diff: no changes"

[[filters.git-diff.tests]]
name = "index lines dropped, hunks kept"
input = """
diff --git a/main.go b/main.go
index 3f1a2b4..9c8d7e6 100644
--- a/main.go
+++ b/main.go
@@ -1,4 +1,5 @@
 package main
+import "fmt"
"""
want = """
diff --git a/main.go b/main.go
--- a/main.go
+++ b/main.go
@@ -1,4 +1,5 @@
 package main
+import "fmt"
"""

[[filters.git-diff.tests]]
name = "empty diff collapses"
input = ""
want = "git diff: no changes"
