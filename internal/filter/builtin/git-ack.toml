# git add / commit / push / pull — success collapses to a terse ack;
# anything unexpected (conflicts, rejections, errors) passes through.
[filters.git-add]
description = "git add: silent success becomes a terse ack"
command = '^git\s+add\b'
strip_ansi = true
if_empty = "ok"

[[filters.git-add.tests]]
name = "silent success acks"
input = ""
want = "ok"

[filters.git-commit]
description = "git commit: keep the summary line only"
command = '^git\s+commit\b'
strip_ansi = true
keep_lines = [
  '^\[',                       # [main abc1234] message
  '\d+ files? changed',        # 2 files changed, 10 insertions(+)
  '(?i)error',
  '(?i)conflict',
  '(?i)nothing to commit',
  '(?i)hook',                  # pre-commit hook failures matter
]
if_empty = "ok"

[[filters.git-commit.tests]]
name = "commit output keeps summary"
input = """
[main 09e5a22] feat(cli): wrapper, route, hook
 13 files changed, 898 insertions(+), 1 deletion(-)
 create mode 100644 internal/cli/wrap.go
 create mode 100644 internal/cli/raw.go
"""
want = """
[main 09e5a22] feat(cli): wrapper, route, hook
 13 files changed, 898 insertions(+), 1 deletion(-)
"""

[[filters.git-commit.tests]]
name = "nothing to commit is kept"
exit_code = 1
input = """
On branch main
nothing to commit, working tree clean
"""
want = "nothing to commit, working tree clean"

[filters.git-push]
description = "git push: collapse the transfer noise, keep the ref result"
command = '^git\s+push\b'
strip_ansi = true
merge_stderr = true
drop_lines = [
  '^Enumerating objects',
  '^Counting objects',
  '^Compressing objects',
  '^Writing objects',
  '^Total ',
  '^remote:\s*$',
  '^remote: Resolving deltas',
  '^\s*$',
]
if_empty = "ok"

[[filters.git-push.tests]]
name = "push noise dropped, result kept"
input = """
Enumerating objects: 24, done.
Counting objects: 100% (24/24), done.
Compressing objects: 100% (14/14), done.
Writing objects: 100% (15/15), 8.72 KiB | 8.72 MiB/s, done.
Total 15 (delta 6), reused 0 (delta 0), pack-reused 0
To github.com:hoophq/julius.git
   0dabaa5..09e5a22  main -> main
"""
want = """
To github.com:hoophq/julius.git
   0dabaa5..09e5a22  main -> main
"""

[filters.git-pull]
description = "git pull: keep the summary, drop transfer noise"
command = '^git\s+pull\b'
strip_ansi = true
merge_stderr = true
drop_lines = [
  '^remote: ',
  '^Receiving objects',
  '^Resolving deltas',
  '^Unpacking objects',
  '^From ',
  '^\s*\* branch',
  '^\s*$',
]
if_empty = "ok"

[[filters.git-pull.tests]]
name = "already up to date"
input = "Already up to date.\n"
want = "Already up to date."
