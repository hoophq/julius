# git status — compact to short-format-style codes: M/A/D/R/? + path.
# Branch context and anything unusual (conflicts, ahead/behind) is kept.
[filters.git-status]
description = "git status: branch + short-style file codes, no hints"
command = '^git\s+status\b'
strip_ansi = true
replace = [
  { pattern = '^\tmodified:\s+', with = 'M ' },
  { pattern = '^\tnew file:\s+', with = 'A ' },
  { pattern = '^\tdeleted:\s+', with = 'D ' },
  { pattern = '^\trenamed:\s+', with = 'R ' },
  { pattern = '^\tboth modified:\s+', with = 'UU ' },
  { pattern = '^\t', with = '? ' },
]
drop_lines = [
  '^\s*\(use "git .*\)',
  '^\s*\(fix conflicts .*\)',
  '^\s*\(commit or discard .*\)',
  '^\s*\(all conflicts fixed.*\)',
  '^Your branch is up to date with',
  '^Changes not staged for commit:',
  '^Changes to be committed:',
  '^Untracked files:',
  '^\s*$',
  '^no changes added to commit',
  '^nothing added to commit but untracked files present',
]
if_empty = "git status: clean"

[[filters.git-status.tests]]
name = "dirty tree compacts to short codes"
input = """
On branch main
Your branch is up to date with 'origin/main'.

Changes to be committed:
  (use "git restore --staged <file>..." to unstage)
	new file:   internal/filter/dsl.go

Changes not staged for commit:
  (use "git add <file>..." to update what will be committed)
  (use "git restore <file>..." to discard changes in working directory)
	modified:   internal/cli/root.go

Untracked files:
  (use "git add <file>..." to include in what will be committed)
	internal/filter/

no changes added to commit (use "git add" and/or "git commit -a")
"""
want = """
On branch main
A internal/filter/dsl.go
M internal/cli/root.go
? internal/filter/
"""

[[filters.git-status.tests]]
name = "clean tree keeps the verdict"
input = """
On branch main
Your branch is up to date with 'origin/main'.

nothing to commit, working tree clean
"""
want = """
On branch main
nothing to commit, working tree clean
"""

[[filters.git-status.tests]]
name = "ahead-behind divergence is kept"
input = """
On branch main
Your branch is ahead of 'origin/main' by 2 commits.
  (use "git push" to publish your local commits)

nothing to commit, working tree clean
"""
want = """
On branch main
Your branch is ahead of 'origin/main' by 2 commits.
nothing to commit, working tree clean
"""
