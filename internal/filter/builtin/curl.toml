# curl — response bodies the agent asked for are payload. A JSON body is
# structurally compacted (arrays capped, long values trimmed, nulls dropped)
# with a disclosure marker — which also shrinks minified single-line responses
# a line cap can't touch. Non-JSON bodies (HTML, docs) keep their lines intact
# and only bound the line count. The progress meter goes to stderr and is
# passed through untouched.

[filters.curl]
description = "curl: compacted JSON body, capped non-JSON body"
command = '^curl\b'
compact_json = true
head = 250

[[filters.curl.tests]]
name = "json body compacted to one line"
input = """
{
  "id": "run_123",
  "status": "completed"
}
"""
want = '{"id":"run_123","status":"completed"}'

[[filters.curl.tests]]
name = "non-json body passes through"
input = "<html><body>hello</body></html>"
want = "<html><body>hello</body></html>"
