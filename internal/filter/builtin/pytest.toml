# pytest — failures and the summary line; passing noise dropped.
[filters.pytest]
description = "pytest: failures and summary only"
command = '(^|\s)pytest\b|^python -m pytest\b'
strip_ansi = true
drop_lines = [
  '^platform ',
  '^rootdir:',
  '^plugins:',
  '^cachedir:',
  '^collected ',
  '^collecting ',
  '^\s*$',
  'PASSED',
  '^[.sxX]+\s*(\[\s*\d+%\])?$',
  '^\S+ [.FEsxX]+\s*\[\s*\d+%\]$',
]
if_empty = "pytest: ok"

[[filters.pytest.tests]]
name = "passing run collapses to summary"
input = """
platform darwin -- Python 3.12.0, pytest-8.0.0
rootdir: /app
plugins: cov-4.1.0
collected 12 items

tests/test_api.py ............                                    [100%]

============================== 12 passed in 0.41s ==============================
"""
want = "============================== 12 passed in 0.41s =============================="

[[filters.pytest.tests]]
name = "failures kept"
exit_code = 1
input = """
collected 2 items

tests/test_api.py .F                                              [100%]

=================================== FAILURES ===================================
_________________________________ test_broken __________________________________

    def test_broken():
>       assert add(1, 1) == 3
E       assert 2 == 3

tests/test_api.py:9: AssertionError
=========================== short test summary info ============================
FAILED tests/test_api.py::test_broken - assert 2 == 3
========================= 1 failed, 1 passed in 0.12s ==========================
"""
want = """
=================================== FAILURES ===================================
_________________________________ test_broken __________________________________
    def test_broken():
>       assert add(1, 1) == 3
E       assert 2 == 3
tests/test_api.py:9: AssertionError
=========================== short test summary info ============================
FAILED tests/test_api.py::test_broken - assert 2 == 3
========================= 1 failed, 1 passed in 0.12s ==========================
"""
